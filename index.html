<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ausgaben-Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <main>
    <div class="topbar">
      <div class="topbar-left">
        <button id="burgerBtn" class="icon-btn" title="Einstellungen">&#9776;</button>
        <button id="themeBtn" class="icon-btn" title="Theme umschalten">☀️</button>
      </div>
      <h1>Ausgaben erfassen</h1>
    </div>

    <!-- Einstellungen-Panel (standardmäßig versteckt) -->
    <div id="settingsPanel" class="settings-panel" hidden>
      <h2>Einstellungen</h2>
      <label class="dialog-label">Monatsbudget (€)
        <input type="number" id="budgetInput" step="0.01" inputmode="decimal" placeholder="z.B. 200.00" />
      </label>
      <div class="buttons" style="margin-top:8px">
        <button id="budgetSaveBtn">Speichern</button>
        <button id="budgetClearBtn" class="btn-secondary">Budget entfernen</button>
      </div>
    </div>

    <!-- Monats-Export-Banner (standardmäßig versteckt) -->
    <div id="monthBanner" class="banner" hidden>
      <p id="bannerText"></p>
      <div class="banner-buttons">
        <button id="bannerExportBtn">📧 Exportieren &amp; Mail öffnen</button>
        <button id="bannerSkipBtn" class="btn-secondary">Überspringen</button>
      </div>
    </div>

    <!-- Monatsübersicht / Budget-Fortschrittsbalken -->
    <div id="monthSummary" class="month-summary">
      <div class="month-summary-row">
        <span id="monthSummaryLabel" class="month-summary-month"></span>
        <span id="monthSummaryAmount" class="month-summary-amount"></span>
      </div>
      <div id="budgetBarWrap" class="budget-bar-wrap" hidden>
        <div class="budget-bar-bg">
          <div id="budgetBarFill" class="budget-bar-fill"></div>
        </div>
      </div>
    </div>

    <div class="form">
      <label>Preis
        <input id="price" type="number" step="0.01" inputmode="decimal" placeholder="0.00" />
      </label>

      <div class="cat-label">Kategorie</div>
      <div class="cat-buttons" id="categoryButtons">
        <button type="button" class="cat-btn cat-rot active" data-value="Basis">Basis</button>
        <button type="button" class="cat-btn cat-gelb" data-value="Extra">Extra</button>
        <button type="button" class="cat-btn cat-gruen" data-value="Luxus">Luxus</button>
      </div>
      <input type="hidden" id="category" value="Basis" />

      <div class="cat-label">Anmerkung <span class="optional">(optional)</span></div>
      <textarea id="remarks" rows="2" placeholder="z.B. Supermarkt – Wocheneinkauf"></textarea>

      <div class="buttons">
        <button id="saveBtn">Speichern</button>
        <button id="exportBtn">Export (CSV)</button>
        <button id="clearBtn" class="btn-danger">Löschen</button>
      </div>
    </div>

    <section>
      <h2>Einträge</h2>
      <ul id="list"></ul>
    </section>

    <footer class="version-footer">
      <span id="versionLabel"></span>
    </footer>
  </main>

  <!-- Export-Dialog -->
  <div id="exportOverlay" class="overlay hidden">
    <div class="dialog">
      <h2>Export (CSV)</h2>
      <label class="dialog-label">Zeitraum
        <select id="exportRange">
          <option value="thisMonth">Aktueller Monat</option>
          <option value="lastMonth">Letzter Monat</option>
          <option value="custom">Benutzerdefiniert</option>
          <option value="all">Alle Daten</option>
        </select>
      </label>
      <div id="customDates" hidden>
        <label class="dialog-label">Von
          <input type="date" id="exportFrom" />
        </label>
        <label class="dialog-label">Bis
          <input type="date" id="exportTo" />
        </label>
      </div>
      <label class="dialog-label">Dateiname
        <input type="text" id="exportFilename" />
      </label>
      <p id="exportCount" class="small"></p>
      <div class="dialog-buttons">
        <button id="exportConfirmBtn">Exportieren</button>
        <button id="exportCancelBtn" class="btn-secondary">Abbrechen</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
