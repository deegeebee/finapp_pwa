<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ausgaben-Tracker</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <main>
    <h1>Ausgaben erfassen</h1>
    <button id="themeBtn" class="theme-btn" title="Theme umschalten">☀️</button>

    <!-- Monats-Export-Banner (standardmäßig versteckt) -->
    <div id="monthBanner" class="banner" hidden>
      <p id="bannerText"></p>
      <div class="banner-buttons">
        <button id="bannerExportBtn">📧 Exportieren &amp; Mail öffnen</button>
        <button id="bannerSkipBtn" class="btn-secondary">Überspringen</button>
      </div>
    </div>

    <div class="form">
      <label>Preis
        <input id="price" type="number" step="0.01" inputmode="decimal" placeholder="0.00" />
      </label>

      <div class="cat-label">Kategorie</div>
      <div class="cat-buttons" id="categoryButtons">
        <button type="button" class="cat-btn cat-rot active" data-value="Basis">Basis</button>
        <button type="button" class="cat-btn cat-gelb" data-value="Extra">Extra</button>
        <button type="button" class="cat-btn cat-gruen" data-value="Luxus">Luxus</button>
      </div>
      <input type="hidden" id="category" value="Basis" />

      <div class="buttons">
        <button id="saveBtn">Speichern</button>
        <button id="exportBtn">Export (CSV)</button>
        <button id="clearBtn" title="Alle Einträge löschen">Löschen</button>
      </div>
    </div>

    <section>
      <h2>Einträge</h2>
      <ul id="list"></ul>
    </section>

    <footer class="version-footer">
      <span id="versionLabel"></span>
    </footer>
  </main>

  <!-- Export-Dialog -->
  <div id="exportOverlay" class="overlay" hidden>
    <div class="dialog">
      <h2>Export (CSV)</h2>
      <label class="dialog-label">Zeitraum
        <select id="exportRange">
          <option value="thisMonth">Aktueller Monat</option>
          <option value="lastMonth">Letzter Monat</option>
          <option value="custom">Benutzerdefiniert</option>
          <option value="all">Alle Daten</option>
        </select>
      </label>
      <div id="customDates" hidden>
        <label class="dialog-label">Von
          <input type="date" id="exportFrom" />
        </label>
        <label class="dialog-label">Bis
          <input type="date" id="exportTo" />
        </label>
      </div>
      <label class="dialog-label">Dateiname
        <input type="text" id="exportFilename" />
      </label>
      <p id="exportCount" class="small"></p>
      <div class="dialog-buttons">
        <button id="exportConfirmBtn">Exportieren</button>
        <button id="exportCancelBtn" class="btn-secondary">Abbrechen</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
